# Render Blueprint：https://render.com/docs/infrastructure-as-code
# 在 Render 控制台「New」→「Blueprint」连接仓库并部署；之后在面板里填 REVERB_API_TOKEN（Secret）

services:
  - type: web
    name: guitar-search
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: REVERB_API_TOKEN
        sync: false
